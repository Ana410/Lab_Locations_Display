<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Location Map</title>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet"/>

  <style>
    body { margin: 0; }
    #map { width: 100vw; height: 100vh; }
  </style>
</head>

<body>
<div id="controls" style="position: absolute; top: 10px; left: 10px; z-index: 2; background: rgba(255,255,255,0.95); padding: 10px 12px; border-radius: 6px; box-shadow: 0 1px 6px rgba(0,0,0,0.15); font-family: sans-serif; font-size: 13px;">
  <div style="font-weight: 600; margin-bottom: 8px;">Filters</div>
  <label style="cursor: pointer; display: flex; align-items: center; gap: 8px; margin-bottom: 6px;">
    <input type="checkbox" id="expired-filter">
    <span>Expired</span>
  </label>
  <label style="cursor: pointer; display: flex; align-items: center; gap: 8px; margin-bottom: 6px;">
    <input type="checkbox" id="expiring-filter">
    <span>Expiring soon</span>
  </label>
  <label style="cursor: pointer; display: flex; align-items: center; gap: 8px;">
    <input type="checkbox" id="normal-filter">
    <span>Normal</span>
  </label>
</div>
<div id="filtered-labs-panel" style="position: absolute; right: 10px; bottom: 170px; z-index: 2; width: 260px; max-height: 42vh; background: rgba(255,255,255,0.96); padding: 10px 12px; border-radius: 6px; box-shadow: 0 1px 6px rgba(0,0,0,0.15); font-family: sans-serif; font-size: 13px; display: none; pointer-events: auto;">
  <div style="font-weight: 600; margin-bottom: 8px;">Shown Labs</div>
  <div id="filtered-labs-list" style="max-height: calc(42vh - 34px); overflow-y: auto; padding-right: 4px;"></div>
</div>
<div id="legend" style="position: absolute; right: 10px; bottom: 10px; z-index: 2; background: rgba(255,255,255,0.95); padding: 10px 12px; border-radius: 6px; box-shadow: 0 1px 6px rgba(0,0,0,0.15); font-family: sans-serif; font-size: 13px; min-width: 160px;">
  <div style="font-weight: 600; margin-bottom: 8px;">Legend</div>
  <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px;">
    <span style="width: 12px; height: 12px; border-radius: 50%; background: #ff3b30; display: inline-block; border: 1px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.08);"></span>
    <span>Expired</span>
  </div>
  <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px;">
    <span style="width: 12px; height: 12px; border-radius: 50%; background: #ff9500; display: inline-block; border: 1px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.08);"></span>
    <span>Expiring soon</span>
  </div>
  <div style="display: flex; align-items: center; gap: 8px;">
    <span style="width: 12px; height: 12px; border-radius: 50%; background: #2b8cff; display: inline-block; border: 1px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.08);"></span>
    <span>Normal</span>
  </div>
</div>
<div id="map"></div>

<script src="app.js?v=20260519"></script>
</body>
</html>
