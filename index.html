<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Location Map</title>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet"/>

  <style>
    body { margin: 0; }
    #map { width: 100vw; height: 100vh; }
  </style>
</head>

<body>
<div id="controls" style="position: absolute; top: 10px; left: 10px; z-index: 2; background: rgba(255,255,255,0.95); padding: 8px 10px; border-radius: 6px; box-shadow: 0 1px 6px rgba(0,0,0,0.15); font-family: sans-serif; font-size: 13px;">
  <label style="cursor: pointer; display: flex; align-items: center; gap: 8px;">
    <input type="checkbox" id="expiring-toggle">
    <span>Show only expiring soon</span>
  </label>
</div>
<div id="map"></div>

<script src="app.js"></script>
</body>
</html>
